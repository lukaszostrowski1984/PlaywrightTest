name: Playwright + Allure Reports (GitHub Pages)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      - name: Setup Java for Allure
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        run: npm install --save-dev allure-commandline
        if: always()

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npx allure generate allure-results --clean -o allure-report
          else
            echo "No Allure results found, skipping report generation"
            mkdir -p allure-report
            echo "<html><body><h1>Allure report was not generated</h1></body></html>" > allure-report/index.html
          fi

      # przygotowanie struktury pod GitHub Pages
      - name: Prepare Pages content
        if: always()
        run: |
          mkdir -p public
          # Copy portfolio
          cp .github/pages/index.html public/
          cp .github/pages/styles.css public/
          # Copy reports if present
          if [ -d "playwright-report" ]; then
            cp -r playwright-report public/playwright-report
          fi
          if [ -d "allure-report" ]; then
            cp -r allure-report public/allure-report
          fi

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public