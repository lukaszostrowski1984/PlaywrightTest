name: Playwright + Allure Reports (GitHub Pages)

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report

      # przygotowanie struktury pod GitHub Pages
      - name: Prepare Pages content
        run: |
          mkdir -p public
          # Copy portfolio
          cp .github/pages/index.html public/
          cp .github/pages/styles.css public/
          # Copy reports
          cp -r playwright-report public/playwright-report
          cp -r allure-report public/allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public