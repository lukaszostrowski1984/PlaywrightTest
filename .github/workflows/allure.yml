name: Allure Report
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Ensure allure-playwright is installed
      run: npm list allure-playwright || npm install allure-playwright --save-dev
    - name: Verify allure-playwright installation
      run: npx allure-playwright --version

    - name: Run Playwright tests with Allure
      run: npx playwright test --workers=1 --retries=0 --reporter=line,allure-playwright
      continue-on-error: true

    - name: List generated files
      run: |
        echo "=== Allure results ==="
        ls -la allure-results/ || echo "allure-results not found"
      if: always()

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-results
        path: allure-results/
        retention-days: 30

    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: ./allure-results
        allure_history: ./allure-history
        keep_reports: 20

    - name: Prepare portfolio pages
      run: |
        mkdir -p portfolio
        cp .github/pages/index.html portfolio/
        cp .github/pages/styles.css portfolio/
        # Copy test reports if they exist
        if [ -d "allure-history" ]; then
          mkdir -p portfolio/allure-report
          cp -r allure-history/* portfolio/allure-report/ 2>/dev/null || true
        fi
        if [ -d "playwright-report" ]; then
          mkdir -p portfolio/playwright-report
          cp -r playwright-report/* portfolio/playwright-report/ 2>/dev/null || true
        fi
        echo "Portfolio prepared with test reports"
      if: always()

    - name: Deploy Portfolio to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./portfolio
        cname: false
