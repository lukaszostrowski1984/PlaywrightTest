name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

  # 1. Run Tests & Generate Results
    - name: Run Playwright tests
      run: npx playwright test --workers=1 --retries=0 --reporter=html
      continue-on-error: true
      
    - name: List generated files
      run: |
        echo "=== Playwright report ==="
        ls -la playwright-report/ || echo "playwright-report not found"
        echo "=== Allure results ==="
        ls -la allure-results/ || echo "allure-results not found"
      if: always()
      
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Get Allure history (for report version tracking)
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages
        
    - name: Deploy Playwright Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./playwright-report
        destination_dir: report-${{ github.run_number }}
